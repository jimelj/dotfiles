- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.zshrc:
    ~/.zshenv:
    ~/.gitconfig:
    ~/.config/bat:
      create: true
      path: config/bat
    ~/.config/ghostty:
      create: true
      path: config/ghostty
    ~/.config/tmux:
      create: true
      path: config/tmux
    ~/.config/starship:
          create: true
          path: config/starship
    ~/Library/LaunchAgents/com.jimelj.focus-sync.plist:
      create: true
      path: LaunchAgents/com.jimelj.focus-sync.plist
- create:
    - ~/Work
    - ~/WebDev/Tutorials

- shell:
    - command: ./setup_homebrew.zsh
      stdin: true
      stdout: true
      stderr: true
    - command: ./setup_zsh.zsh
      stdin: true
      stdout: true
      stderr: true
    - command: ./setup_node.zsh
      stdin: true
      stdout: true
      stderr: true
    - command: ./setup_macos.zsh
      stdin: true
      stdout: true
      stderr: true
    - description: Load the focus-sync LaunchAgent (8am/5pm). Idempotent; safe if already loaded.
      command: launchctl bootout gui/$(id -u)/com.jimelj.focus-sync 2>/dev/null; launchctl bootstrap gui/$(id -u) ~/Library/LaunchAgents/com.jimelj.focus-sync.plist 2>/dev/null; true
